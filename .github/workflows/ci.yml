name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase
    env:
      APP_ENV: test
      PORT: 3000
      LOG_LEVEL: fatal
      DATABASE_URL: postgresql://nidhiflow_ci:nidhiflow_ci@localhost:5432/nidhiflow_ci
      DATABASE_SSL: "false"
      CORS_ORIGINS: http://localhost:5173
      NIDHIFLOW_API_BASE_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: nidhiflow_ci
          POSTGRES_PASSWORD: nidhiflow_ci
          POSTGRES_DB: nidhiflow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nidhiflow_ci -d nidhiflow_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codebase/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run PostgreSQL integration tests
        run: npm run test:integration
