services:
  - type: web
    name: nidhiflow-backend
    runtime: node
    plan: free
    buildCommand: cd codebase && npm install && npm run build --workspace @nidhiflow/backend
    startCommand: cd codebase && npm run start --workspace @nidhiflow/backend
    healthCheckPath: /health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGINS
        value: https://nidhiflow.vercel.app
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: AUTH_DEBUG_TOKENS_ENABLED
        value: "true"
      - key: FLOW_AI_ENABLED
        value: "false"
      - key: APP_PUBLIC_URL
        value: https://nidhiflow.vercel.app
      - key: EMAIL_DELIVERY_PROVIDER
        value: gmail
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
