      .small { font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #64748B; }
      .value { font-family: Inter, Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #0F172A; }
      .green { fill: #16A34A; }
      .darkGreen { fill: #166534; }
