<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.055"/>
    </filter>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.075"/>
    </filter>
    <filter id="flowShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#16A34A" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15B943"/>
      <stop offset="100%" stop-color="#0D8E35"/>
    </linearGradient>
    <radialGradient id="flowBall" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#7DF28F"/>
      <stop offset="55%" stop-color="#17A34A"/>
      <stop offset="100%" stop-color="#076B2D"/>
    </radialGradient>
    <style>
      .font { font-family: Inter, Arial, sans-serif; }
      .brand { font-family: Inter, Arial, sans-serif; font-size: 23px; font-weight: 900; fill: #07752E; }
      .slogan { font-family: Inter, Arial, sans-serif; font-size: 9.5px; font-weight: 600; fill: #43556B; }
      .greeting { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 900; fill: #101827; }
      .sub { font-family: Inter, Arial, sans-serif; font-size: 11.5px; font-weight: 600; fill: #59677B; }
      .section { font-family: Inter, Arial, sans-serif; font-size: 15.5px; font-weight: 900; fill: #111827; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 12.5px; font-weight: 800; fill: #111827; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 8px; font-weight: 700; fill: #536277; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 9px; font-weight: 700; fill: #536277; }
      .value { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 900; fill: #111827; }
      .greenText { fill: #079333; }
    </style>
  </defs>

  <!-- Exact white background like selected visual -->
